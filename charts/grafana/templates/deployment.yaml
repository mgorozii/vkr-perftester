apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels: {app: grafana}
  template:
    metadata:
      labels: {app: grafana}
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image }}"
          ports:
            - containerPort: 3000
          env:
            - name: GF_INSTALL_PLUGINS
              value: simpod-json-datasource
            - name: GF_PANELS_DISABLE_SANITIZE_HTML
              value: "true"
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: provisioning
          configMap:
            name: grafana-provisioning
        - name: dashboards
          configMap:
            name: grafana-dashboards
