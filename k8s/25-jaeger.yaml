apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: loadtest-system
spec:
  selector:
    app: jaeger
  ports:
    - {name: ui, port: 16686, targetPort: 16686}
    - {name: otlp-http, port: 4318, targetPort: 4318}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: loadtest-system
spec:
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0
          ports:
            - {containerPort: 16686}
            - {containerPort: 4318}
          readinessProbe:
            httpGet:
              path: /
              port: 16686
